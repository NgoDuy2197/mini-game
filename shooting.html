<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            background-color: #f0f0f0;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: black;
        }
    </style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Base64 Image for main character and enemy
    const playerImgSrc = "https://e7.pngegg.com/pngimages/504/584/png-clipart-hunting-fly-fishing-game-hunt-sports-weapon.png"
    const hitImgSrc = "https://pngtree.com/so/emoticon---poop"

    const playerSize = 50;
    const enemySize = 100;
    const bulletSize = 5;

    let player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        speed: 5,
        width: playerSize,
        height: playerSize
    };

    let bullets = [];
    let enemies = [];
    let score = 0;

    const playerImg = new Image();
    playerImg.src = playerImgSrc;

    const hitImg = new Image();
    hitImg.src = hitImgSrc;

    // Generate enemies
    function createEnemy() {
        const x = Math.random() * (canvas.width - enemySize);
        enemies.push({
            x: x,
            y: -enemySize,
            width: enemySize,
            height: enemySize,
            speed: 2,
            alive: true
        });
    }

    // Move player based on input
    function movePlayer() {
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' && player.y > 0) player.y -= player.speed;
            if (e.key === 's' && player.y < canvas.height - player.height) player.y += player.speed;
            if (e.key === 'a' && player.x > 0) player.x -= player.speed;
            if (e.key === 'd' && player.x < canvas.width - player.width) player.x += player.speed;
            if (e.key === ' ') fireBullet();
        });
    }

    // Fire bullet
    function fireBullet() {
        bullets.push({
            x: player.x + player.width / 2 - bulletSize / 2,
            y: player.y,
            width: bulletSize * 2,
            height: bulletSize * 2,
            speed: 7
        });
    }

    // Check collision between two rectangles
    function isColliding(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.width &&
            rect1.x + rect1.width > rect2.x &&
            rect1.y < rect2.y + rect2.height &&
            rect1.y + rect1.height > rect2.y
        );
    }

    // Update game
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw player
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

        // Draw bullets and update their position
        bullets = bullets.filter(bullet => bullet.y > 0);
        bullets.forEach(bullet => {
            bullet.y -= bullet.speed;
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, bulletSize, 0, Math.PI * 2);
            ctx.fill();
        });

        // Draw enemies and update their position
        enemies.forEach(enemy => {
            if (enemy.alive) {
                enemy.y += enemy.speed;
                ctx.drawImage(playerImg, enemy.x, enemy.y, enemy.width, enemy.height);
            } else {
                ctx.drawImage(hitImg, enemy.x, enemy.y, enemy.width, enemy.height);
            }
        });

        // Check collisions between bullets and enemies
        enemies.forEach(enemy => {
            if (enemy.alive) {
                bullets.forEach(bullet => {
                    if (isColliding(bullet, enemy)) {
                        enemy.alive = false;
                        score += 1;
                        scoreElement.textContent = `Score: ${score}`;
                    }
                });
            }
        });

        // Remove dead enemies after animation
        enemies = enemies.filter(enemy => enemy.y < canvas.height && enemy.alive);

        // Create new enemies
        if (Math.random() < 0.02) {
            createEnemy();
        }

        requestAnimationFrame(update);
    }

    movePlayer();
    update();

</script>

</body>
</html>
