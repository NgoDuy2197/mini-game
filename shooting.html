<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #6998fd 0%, #5739dc 100%);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" fill="%23FF0000" stroke="%23FFFFFF" stroke-width="2"/></svg>') 10 10, auto;
        }
        canvas {
            display: block;
            background: transparent;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 10px;
        }
        #gameInfo {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: right;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 10px;
        }
        #powerUpIndicator {
            position: absolute;
            top: 50px;
            left: 10px;
            font-size: 16px;
            color: yellow;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 8px;
        }
        #enemyInfo {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            display: none;
            max-width: 200px;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 200;
        }
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="gameInfo">
    <div>Wave: <span id="wave">1</span></div>
    <div>Health: <span id="health">1000</span></div>
    <div>High Score: <span id="highScore">0</span></div>
</div>
<div id="powerUpIndicator">Power-Up Active!</div>
<div id="enemyInfo">
    <strong>Enemy Info:</strong>
    <div id="enemyDetails"></div>
</div>
<div id="startScreen">
    <h1>🪰 Fly Shooter Game 🎯</h1>
    <p>Move your mouse to control the shooter</p>
    <p>Click to fire bullets at flies</p>
    <p>Collect power-ups for special abilities!</p>
    <p>Don't let flies reach the bottom!</p>
    <button onclick="startGame()">Start Game</button>
</div>
<div id="gameOver">
    <h2>Game Over!</h2>
    <p>Final Score: <span id="finalScore">0</span></p>
    <p>Waves Survived: <span id="finalWave">0</span></p>
    <button onclick="restartGame()">Play Again</button>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // ==================== ENEMY IMAGE CONFIGURATION ====================
// Replace these null values with your GIF URLs to use custom enemy images
// If left as null, the game will use colored rectangles with animations
// 
// NOTE: When using background images, enemy colors should contrast with your backgrounds
// EXAMPLE: const enemy1ImgSrc = "https://example.com/housefly.gif";
//
// Enemy Image URLs (replace null with your GIF URLs):
const enemy1ImgSrc = null;  // House Fly - Replace with your housefly GIF
const enemy2ImgSrc = null;  // Bee - Replace with your bee GIF  
const enemy3ImgSrc = null;  // Wasp - Replace with your wasp GIF
const enemy4ImgSrc = null;  // Mosquito - Replace with your mosquito GIF
const enemy5ImgSrc = null;  // Dragonfly - Replace with your dragonfly GIF

// Other images (optional):
const hitImgSrc = null;      // Hit/explosion effect - Replace with your effect GIF
const powerUpImgSrc = null;  // Star power-up - Replace with your power-up GIF
// =================================================================

// Image sources - using PNG for player (more reliable than GIF)
const playerImgSrc = "https://static.vecteezy.com/system/resources/thumbnails/051/554/908/small/retro-rocket-primed-for-launch-png.png" // Rocket PNG

    const playerSize = 60;
    const enemySize = 40;
    const bulletSize = 4;
    const powerUpSize = 30;

    let player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        width: playerSize,
        height: playerSize,
        targetX: canvas.width / 2
    };

    let bullets = [];
    let enemies = [];
    let powerUps = [];
    let particles = [];
    let score = 0;
    let health = 1000;
    let wave = 1;
    let highScore = localStorage.getItem('flyShooterHighScore') || 0;
    let gameRunning = false;
    let mouseX = canvas.width / 2;
    let lastShotTime = 0;
    let fireRate = 120; // milliseconds between shots (increased fire rate)
    let autoFire = false; // Auto-fire toggle state
    let autoMove = false; // Auto-movement toggle state
    let currentPowerUp = null;
    let powerUpEndTime = 0;
    let enemySpawnRate = 0.02;
    let enemiesKilled = 0;
    let waveEnemyCount = 10;
    // ==================== BACKGROUND IMAGE CONFIGURATION ====================
// Add your background image URLs here to use images instead of colors
// If you don't provide images, the game will use gradient colors
// EXAMPLE: const backgroundImages = ["https://example.com/forest.jpg", "https://example.com/ocean.jpg"];
const backgroundImages = []; // Add your image URLs here

// Fallback gradient colors (used when no background images provided) - Darker tones for better enemy visibility
let backgroundColors = [
        { start: '#1a1a2e', end: '#16213e' }, // Dark navy
        { start: '#0f3460', end: '#16213e' }, // Deep ocean
        { start: '#2d1b69', end: '#0f3460' }, // Dark purple
        { start: '#1e3a5f', end: '#2d1b69' }, // Midnight blue
        { start: '#16213e', end: '#0f3460' }, // Dark space
        { start: '#0d1b2a', end: '#1b263b' }, // Dark charcoal
        { start: '#1b263b', end: '#2d1b69' }, // Dark violet
        { start: '#0f0f1e', end: '#1a1a2e' }, // Dark void
        { start: '#16213e', end: '#1e3a5f' }, // Dark steel
        { start: '#1a1a2e', end: '#0d1b2a' }  // Dark abyss
    ];
let currentColorIndex = 0;
let backgroundTransitionTime = 0;
let backgroundTransitionDuration = 10000; // 10 seconds in milliseconds

// Background image loading system
let loadedBackgroundImages = [];
let currentBackgroundIndex = 0;
let useBackgroundImages = backgroundImages.length > 0;
    
    // Player animation variables
    let playerScale = 1.0;
    let playerTargetScale = 1.0;
    let playerJumpY = 0;
    let playerTargetJumpY = 0;
    let playerJumpVelocity = 0;
    let isJumping = false;
    let playerRecoilY = 0;
    let playerTargetRecoilY = 0;

    // Sound system using Web Audio API
    let audioContext = null;
    
    // Initialize audio context on first user interaction
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    
    // Play shooting sound effect
    function playShootSound() {
        if (!audioContext) return;
        
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.1);
    }
    
    // Play enemy death sound effect
    function playDeathSound() {
        if (!audioContext) return;
        
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
        
        gainNode.gain.setValueAtTime(0.7, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
    }
    
    // Play power-up collection sound effect
    function playPowerUpSound() {
        if (!audioContext) return;
        
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.15);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.15);
    }
    
    // Load background images
    function loadBackgroundImages() {
        if (!useBackgroundImages) return;
        
        backgroundImages.forEach((imageUrl, index) => {
            const img = new Image();
            img.onload = () => {
                loadedBackgroundImages[index] = img;
            };
            img.onerror = () => {
                console.warn(`Failed to load background image ${index}: ${imageUrl}`);
                // Fall back to gradient colors if image fails
                useBackgroundImages = false;
            };
            img.src = imageUrl;
        });
    }

    // Update background with images or gradients
    function updateBackground(currentTime) {
        if (useBackgroundImages && loadedBackgroundImages.length > 0) {
            // Use background images
            const img = loadedBackgroundImages[currentBackgroundIndex];
            if (img) {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }
        } else {
            // Use gradient colors (fallback)
            const colors = backgroundColors[currentColorIndex];
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, colors.start);
            gradient.addColorStop(1, colors.end);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // Handle transitions
        if (currentTime - backgroundTransitionTime > backgroundTransitionDuration) {
            backgroundTransitionTime = currentTime;
            
            if (useBackgroundImages) {
                currentBackgroundIndex = (currentBackgroundIndex + 1) % backgroundImages.length;
            } else {
                currentColorIndex = (currentColorIndex + 1) % backgroundColors.length;
            }
        }
    }

    // Get contrasting bullet color based on background
    function getContrastingBulletColor() {
        if (useBackgroundImages) {
            // For images, use a contrasting color that works on most backgrounds
            return '#FF0000'; // Red for most images
        }
        
        const currentColors = backgroundColors[currentColorIndex];
        const bgColor = currentColors.start;
        
        // Convert hex to RGB
        const hex = bgColor.replace('#', '');
        const r = parseInt(hex.substr(0, 2), 16);
        const g = parseInt(hex.substr(2, 2), 16);
        const b = parseInt(hex.substr(4, 2), 16);
        
        // Calculate luminance
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b) /255;
        
        // Return contrasting color
        if (luminance > 0.5) {
            return '#FF0000'; // Red for light backgrounds
        } else {
            return '#FFFF00'; // Yellow for dark backgrounds
        }
    }

    // Player sprite animation system
    const playerSprites = [];
    let playerAnimationFrame = 0;
    let playerAnimationTime = 0;
    let playerAnimationSpeed = 100; // milliseconds per frame
    let playerImgLoaded = false;

    // Create animated player using CSS sprite approach
    function createAnimatedPlayer() {
        console.log('Loading player image from:', playerImgSrc);
        const img = new Image();
        // Try without crossOrigin first to see if that helps
        // img.crossOrigin = "anonymous";
        
        img.onload = function() {
            console.log('Player image loaded successfully, dimensions:', img.width, 'x', img.height);
            
            // Create canvas to extract frames
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            // Set canvas size to match GIF
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            
            // For now, we'll use the image as-is with animation effects
            playerSprites.push(img);
            playerImgLoaded = true;
            console.log('Player GIF loaded successfully, total sprites:', playerSprites.length);
        };
        
        img.onerror = function(error) {
            console.error('Failed to load player GIF, error:', error);
            console.error('Image URL that failed:', playerImgSrc);
            playerImgLoaded = false;
        };
        
        img.src = playerImgSrc;
    }

    // Initialize player animation
    createAnimatedPlayer();
    
    // Force image loading check after a delay
    setTimeout(() => {
        console.log('Forced check - imgLoaded:', playerImgLoaded, 'sprites:', playerSprites.length);
        if (!playerImgLoaded) {
            console.log('Image still not loaded, retrying...');
            createAnimatedPlayer();
        }
    }, 2000);
    const enemy1Img = null;
    const enemy2Img = null;
    const enemy3Img = null;
    const enemy4Img = null;
    const enemy5Img = null;
    const hitImg = null;
    const powerUpImg = null;

    // Enemy types configuration - 5 Different Enemies (Child-friendly colors)
    const enemyTypes = {
        housefly: {
            name: 'House Fly',
            width: enemySize,
            height: enemySize,
            speed: 2.5,
            health: 1,
            points: 10,
            color: '#FF69B4', // Hot pink
            description: 'Standard enemy'
        },
        bee: {
            name: 'Bee',
            width: enemySize * 0.9,
            height: enemySize * 0.9,
            speed: 3.5,
            health: 1,
            points: 15,
            color: '#FFD700', // Sunny yellow
            description: 'Fast and agile'
        },
        wasp: {
            name: 'Wasp',
            width: enemySize * 1.1,
            height: enemySize * 1.1,
            speed: 4.0,
            health: 2,
            points: 25,
            color: '#FF8C00', // Bright orange
            description: 'Dangerous stinger'
        },
        mosquito: {
            name: 'Mosquito',
            width: enemySize * 0.7,
            height: enemySize * 0.7,
            speed: 5.0,
            health: 1,
            points: 20,
            color: '#9370DB', // Medium purple
            description: 'Very fast but fragile'
        },
        dragonfly: {
            name: 'Dragonfly',
            width: enemySize * 1.3,
            height: enemySize * 1.3,
            speed: 1.8,
            health: 3,
            points: 35,
            color: '#00CED1', // Dark turquoise
            description: 'Tanky with high health'
        }
    };

    // Generate enemies randomly from all 5 types
    function createEnemy() {
        // 5% chance to spawn a boss enemy
        const isBoss = Math.random() < 0.05;
        
        let enemyConfig;
        let randomType;
        
        if (isBoss) {
            // Boss enemy - pick a random type and enhance it
            const allTypes = Object.keys(enemyTypes);
            randomType = allTypes[Math.floor(Math.random() * allTypes.length)];
            enemyConfig = enemyTypes[randomType];
            
            // Create boss version with enhanced stats
            enemyConfig = {
                ...enemyConfig,
                width: enemyConfig.width * 2,  // Double size
                height: enemyConfig.height * 2, // Double size
                health: enemyConfig.health * 5,  // 5x health
                points: enemyConfig.points * 10, // 10x points
                color: '#FF0000', // Boss color (red)
                name: 'BOSS ' + enemyConfig.name
            };
        } else {
            // Regular enemy
            const allTypes = Object.keys(enemyTypes);
            randomType = allTypes[Math.floor(Math.random() * allTypes.length)];
            enemyConfig = enemyTypes[randomType];
        }
        
        // 30% chance for horizontal flyer (but not for bosses)
        const isHorizontalFlyer = !isBoss && Math.random() < 0.3;
        
        let enemy = {
            width: enemyConfig.width,
            height: enemyConfig.height,
            speed: enemyConfig.speed + (wave - 1) * 0.15,
            health: enemyConfig.health,
            maxHealth: enemyConfig.health,
            points: enemyConfig.points,
            type: randomType,
            name: enemyConfig.name,
            color: enemyConfig.color,
            alive: true,
            isBoss: isBoss, // Boss flag
            wobble: Math.random() * Math.PI * 2, // Random starting wobble phase
            wobbleSpeed: 0.05 + Math.random() * 0.03, // Random wobble speed
            wobbleAmount: 10 + Math.random() * 10, // Random wobble amount (10-20px)
            isHorizontalFlyer: isHorizontalFlyer,
            horizontalDirection: Math.random() < 0.5 ? -1 : 1,
            verticalOffset: 0,
            verticalSpeed: 0.01 + Math.random() * 0.015, // Slower vertical movement
            verticalAmplitude: 15 + Math.random() * 20, // Smaller amplitude for smoother movement
            // Pause behavior for vertical enemies
            isPaused: false,
            pauseStartTime: 0,
            pauseDuration: 0,
            targetPauseY: canvas.height * 0.3 + Math.random() * canvas.height * 0.2, // Random pause height between 30-50% of screen
            sleepCount: 0,
            maxSleepCount: 2, // Maximum 2 sleeps per enemy
            shape: ['round', 'square', 'rectangle', 'diamond'][Math.floor(Math.random() * 4)] // Randomly choose from 4 shapes
        };
        
        if (isHorizontalFlyer) {
            // Horizontal flyers spawn in middle-upper area
            enemy.y = (Math.random() * (canvas.height * 0.6)) + 50;
            if (enemy.horizontalDirection > 0) {
                enemy.x = -enemyConfig.width; // Start from left
            } else {
                enemy.x = canvas.width; // Start from right
            }
        } else {
            // Regular enemies spawn at top
            enemy.x = Math.random() * (canvas.width - enemyConfig.width);
            enemy.y = -enemyConfig.height;
        }
        
        enemies.push(enemy);
    }

    // Create power-up
    function createPowerUp(x, y) {
        if (Math.random() < 0.1) { // 10% chance
            const types = ['rapidFire', 'multiShot', 'bigBullet', 'shield'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            powerUps.push({
                x: x,
                y: y,
                width: powerUpSize,
                height: powerUpSize,
                speed: 2,
                type: type,
                color: '#FFD700'
            });
        }
    }

    // Create particle effect
    function createParticles(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                size: Math.random() * 4 + 2,
                color: color,
                life: 1.0
            });
        }
    }

    function createTeleportEffect(x, y) {
        // Create particles for teleport effect
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                size: Math.random() * 5 + 2,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                life: 1.0
            });
        }
    }

    // Create firework explosion effect with random patterns
    function createFireworkExplosion(x, y, baseColor, isBoss = false) {
        const particleCount = isBoss ? 60 : 30; // More particles for bosses
        const colors = [
            '#FF0000', '#FF4500', '#FFA500', '#FFFF00', '#00FF00', 
            '#00FFFF', '#0000FF', '#4B0082', '#FF1493', '#FF69B4', '#FFD700'
        ];
        
        // Random explosion pattern
        const patterns = ['circle', 'star', 'heart', 'spiral', 'random'];
        const pattern = patterns[Math.floor(Math.random() * patterns.length)];
        
        for (let i = 0; i < particleCount; i++) {
            let angle, velocity;
            
            switch(pattern) {
                case 'circle':
                    angle = (Math.PI * 2 * i) / particleCount;
                    velocity = isBoss ? 6 + Math.random() * 8 : 3 + Math.random() * 5;
                    break;
                case 'star':
                    angle = (Math.PI * 2 * i) / particleCount;
                    velocity = (i % 2 === 0) ? 
                        (isBoss ? 10 + Math.random() * 4 : 5 + Math.random() * 3) : 
                        (isBoss ? 4 + Math.random() * 3 : 2 + Math.random() * 2);
                    break;
                case 'heart':
                    const heartAngle = (Math.PI * 2 * i) / particleCount;
                    angle = heartAngle + Math.sin(heartAngle * 2) * 0.3;
                    velocity = isBoss ? 5 + Math.random() * 6 : 3 + Math.random() * 4;
                    break;
                case 'spiral':
                    angle = (Math.PI * 2 * i) / particleCount + (i * 0.1);
                    velocity = isBoss ? 4 + Math.random() * 8 + (i * 0.1) : 2 + Math.random() * 4 + (i * 0.05);
                    break;
                default: // random
                    angle = Math.random() * Math.PI * 2;
                    velocity = isBoss ? 2 + Math.random() * 10 : 1 + Math.random() * 6;
            }
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            particles.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * velocity,
                vy: Math.sin(angle) * velocity,
                size: isBoss ? Math.random() * 7 + 2 : Math.random() * 5 + 1,
                color: color,
                life: 2.5, // Even longer life
                isFirework: true,
                gravity: 0.08,
                sparkle: Math.random() < 0.3 // 30% chance for sparkle effect
            });
        }
        
        // Add multiple secondary explosions for cascade effect
        setTimeout(() => {
            for (let j = 0; j < 2; j++) {
                setTimeout(() => {
                    for (let i = 0; i < particleCount / 3; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = 1 + Math.random() * 3;
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        
                        particles.push({
                            x: x + (Math.random() - 0.5) * 30,
                            y: y + (Math.random() - 0.5) * 30,
                            vx: Math.cos(angle) * velocity,
                            vy: Math.sin(angle) * velocity,
                            size: Math.random() * 3 + 1,
                            color: color,
                            life: 1.8,
                            isFirework: true,
                            gravity: 0.04
                        });
                    }
                }, j * 50);
            }
        }, 100);
    }

    // Mouse movement handler
    function handleMouseMove(e) {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        player.targetX = mouseX - player.width / 2;
        
        // Keep player within bounds
        player.targetX = Math.max(0, Math.min(canvas.width - player.width, player.targetX));
    }

    // Mouse click handler
    function handleMouseClick(e) {
        if (gameRunning) {
            fireBullet();
        }
    }

    // Right-click handler for jump
    function handleRightClick(e) {
        e.preventDefault();
        if (gameRunning && !isJumping) {
            // Calculate random jump height (20% of screen height from bottom)
            const maxJumpHeight = canvas.height * 0.2;
            const randomHeight = Math.random() * maxJumpHeight;
            playerTargetJumpY = -randomHeight;
            playerJumpVelocity = -15; // Initial jump velocity
            isJumping = true;
        }
    }

    // Mouse down handler for middle-click teleport
    function handleMouseDown(e) {
        if (gameRunning && e.button === 1) { // Middle mouse button
            e.preventDefault();
            // Random teleport left or right
            const teleportDistance = 100 + Math.random() * 200; // 100-300px
            const direction = Math.random() < 0.5 ? -1 : 1;
            player.targetX = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x + (teleportDistance * direction)));
            
            // Create teleport effect
            createTeleportEffect(player.x, player.y);
        }
    }

    // Update enemy info display with closest enemy information
    function updateEnemyInfo() {
        const enemyInfoDiv = document.getElementById('enemyInfo');
        const enemyDetailsDiv = document.getElementById('enemyDetails');
        
        if (enemies.length === 0 || !gameRunning) {
            enemyInfoDiv.style.display = 'none';
            return;
        }
        
        // Find the closest enemy to the player
        let closestEnemy = null;
        let closestDistance = Infinity;
        
        enemies.forEach(enemy => {
            if (enemy.alive) {
                const distance = Math.sqrt(
                    Math.pow(enemy.x + enemy.width/2 - (player.x + player.width/2), 2) +
                    Math.pow(enemy.y + enemy.height/2 - (player.y + player.height/2), 2)
                );
                
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestEnemy = enemy;
                }
            }
        });
        
        if (closestEnemy) {
            const enemyConfig = enemyTypes[closestEnemy.type];
            const distanceText = closestDistance < 200 ? 
                `Distance: ${Math.round(closestDistance)}m` : 
                `Distance: ${Math.round(closestDistance)}m`;
            
            enemyDetailsDiv.innerHTML = `
                <div><strong>${enemyConfig.name}</strong> ${closestEnemy.isBoss ? '👑' : ''}</div>
                <div>${enemyConfig.description}</div>
                <div>Health: ${closestEnemy.health}/${closestEnemy.maxHealth}</div>
                <div>Speed: ${enemyConfig.speed.toFixed(1)}</div>
                <div>Points: ${enemyConfig.points}</div>
                <div>${distanceText}</div>
            `;
            
            // Always show but make it more transparent
            enemyInfoDiv.style.display = 'block';
            enemyInfoDiv.style.background = 'rgba(0, 0, 0, 0.3)'; // More transparent
            enemyInfoDiv.style.backdropFilter = 'blur(5px)'; // Add blur effect
        } else {
            enemyInfoDiv.style.display = 'none';
        }
    }

    // Update player position smoothly
    function updatePlayer() {
        // Auto-movement logic
        if (autoMove) {
            // Move towards nearest enemy
            if (enemies.length > 0) {
                let closestEnemy = null;
                let closestDistance = Infinity;
                
                enemies.forEach(enemy => {
                    if (enemy.alive) {
                        const distance = Math.sqrt(
                            Math.pow(enemy.x + enemy.width/2 - (player.x + player.width/2), 2) +
                            Math.pow(enemy.y + enemy.height/2 - (player.y + player.height/2), 2)
                        );
                        
                        if (distance < closestDistance) {
                            closestDistance = distance;
                            closestEnemy = enemy;
                        }
                    }
                });
                
                if (closestEnemy) {
                    // Move towards the center of the closest enemy
                    player.targetX = closestEnemy.x + closestEnemy.width/2 - player.width/2;
                }
            }
        }
        
        const dx = player.targetX - player.x;
        player.x += dx * 0.15; // Smooth movement
        
        // Update scaling animation
        const scaleDiff = playerTargetScale - playerScale;
        playerScale += scaleDiff * 0.2; // Smooth scaling transition
        
        // Update recoil animation
        const recoilDiff = playerTargetRecoilY - playerRecoilY;
        playerRecoilY += recoilDiff * 0.3; // Smooth recoil transition
        
        // Update jumping animation
        if (isJumping) {
            playerJumpVelocity += 0.8; // Gravity
            playerJumpY += playerJumpVelocity;
            
            // Check if landed back at original position
            if (playerJumpY >= 0) {
                playerJumpY = 0;
                playerJumpVelocity = 0;
                isJumping = false;
            }
        }
    }

    // Fire bullet with power-up support
    function fireBullet() {
        const currentTime = Date.now();
        if (currentTime - lastShotTime < fireRate) return;
        
        lastShotTime = currentTime;
        
        // Add shooting recoil effect (no scaling)
        const recoilDistance = 15; // Fixed 15px downward recoil
        playerTargetRecoilY = recoilDistance;
        setTimeout(() => {
            playerTargetRecoilY = 0; // Reset recoil
        }, 100);
        
        // Play shooting sound
        playShootSound();
        
        const bulletX = player.x + player.width / 2;
        const bulletY = player.y;
        
        if (currentPowerUp === 'multiShot') {
            // Triple shot
            for (let i = -1; i <= 1; i++) {
                bullets.push({
                    x: bulletX + i * 15,
                    y: bulletY,
                    width: currentPowerUp === 'bigBullet' ? bulletSize * 4 : bulletSize * 2,
                    height: currentPowerUp === 'bigBullet' ? bulletSize * 4 : bulletSize * 2,
                    speed: 8,
                    damage: currentPowerUp === 'bigBullet' ? 2 : 1
                });
            }
        } else {
            bullets.push({
                x: bulletX,
                y: bulletY,
                width: currentPowerUp === 'bigBullet' ? bulletSize * 4 : bulletSize * 2,
                height: currentPowerUp === 'bigBullet' ? bulletSize * 4 : bulletSize * 2,
                speed: 8,
                damage: currentPowerUp === 'bigBullet' ? 2 : 1
            });
        }
    }

    // Check collision between two rectangles
    function isColliding(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.width &&
            rect1.x + rect1.width > rect2.x &&
            rect1.y < rect2.y + rect2.height &&
            rect1.y + rect1.height > rect2.y
        );
    }

    // Update game
    function updateBackground(currentTime) {
        // Update background transition
        if (currentTime - backgroundTransitionTime > backgroundTransitionDuration) {
            backgroundTransitionTime = currentTime;
            currentColorIndex = (currentColorIndex + 1) % backgroundColors.length;
        }
        
        const currentColors = backgroundColors[currentColorIndex];
        const progress = (currentTime - backgroundTransitionTime) / backgroundTransitionDuration;
        
        // Smooth color transition
        document.body.style.background = `linear-gradient(180deg, ${currentColors.start} 0%, ${currentColors.end} 100%)`;
    }

    function update() {
        try {
            if (!gameRunning) return;
            
            const currentTime = Date.now();
            
            // Update background
            updateBackground(currentTime);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Update game state
        updatePlayer();
        updatePowerUps();
        updateParticles();
        updateUI();
        updateEnemyInfo();

        // Auto-fire functionality
        if (autoFire && gameRunning) {
            fireBullet();
        }

        // Draw and update bullets
        bullets = bullets.filter(bullet => bullet.y > -10);
        bullets.forEach(bullet => {
            bullet.y -= bullet.speed;
            
            // Get contrasting bullet color
            const bulletColor = getContrastingBulletColor();
            const glowColor = currentPowerUp ? '#FFD700' : bulletColor;
            
            // Draw bullet with glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = glowColor;
            ctx.fillStyle = glowColor;
            ctx.beginPath();
            ctx.arc(bullet.x + bullet.width/2, bullet.y + bullet.height/2, bullet.width/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Draw and update enemies
        enemies = enemies.filter(enemy => {
            if (enemy.alive) {
                // Update wobble for visual effect
                enemy.wobble += enemy.wobbleSpeed;
                
                // Apply knockback if active
                if (enemy.isKnockedBack) {
                    enemy.x += enemy.knockbackX;
                    enemy.y += enemy.knockbackY;
                    enemy.knockbackX *= enemy.knockbackDecay;
                    enemy.knockbackY *= enemy.knockbackDecay;
                    
                    // Stop knockback when minimal
                    if (Math.abs(enemy.knockbackX) < 0.5 && Math.abs(enemy.knockbackY) < 0.5) {
                        enemy.isKnockedBack = false;
                        enemy.knockbackX = 0;
                        enemy.knockbackY = 0;
                    }
                }
                
                if (enemy.isHorizontalFlyer) {
                    // Horizontal movement with vertical wave
                    if (!enemy.isKnockedBack) {
                        enemy.x += enemy.speed * enemy.horizontalDirection;
                    }
                    enemy.verticalOffset = Math.sin(Date.now() * enemy.verticalSpeed) * enemy.verticalAmplitude;
                    
                    // Die when 30px outside screen boundaries
                    if ((enemy.horizontalDirection > 0 && enemy.x > canvas.width + 30) ||
                        (enemy.horizontalDirection < 0 && enemy.x < -enemy.width - 30)) {
                        // Enemy dies when 30px outside screen
                        enemy.alive = false;
                        score += enemy.points;
                        enemiesKilled++;
                        createFireworkExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color, enemy.isBoss);
                        return false;
                    }
                    
                    // Bounce back when hitting screen edges (before 30px buffer)
                    if (enemy.horizontalDirection > 0 && enemy.x > canvas.width - enemy.width) {
                        enemy.x = canvas.width - enemy.width;
                        enemy.horizontalDirection = -1; // Reverse direction
                    } else if (enemy.horizontalDirection < 0 && enemy.x < 0) {
                        enemy.x = 0;
                        enemy.horizontalDirection = 1; // Reverse direction
                    }
                } else {
                    // Regular downward movement with pause behavior
                    if (!enemy.isPaused && !enemy.isKnockedBack) {
                        enemy.y += enemy.speed;
                        
                        // Check if enemy reached pause height and hasn't exceeded max sleep count
                        if (enemy.y >= enemy.targetPauseY && !enemy.isPaused && enemy.sleepCount < enemy.maxSleepCount) {
                            enemy.isPaused = true;
                            enemy.pauseStartTime = Date.now();
                            enemy.pauseDuration = 1000 + Math.random() * 2000; // 1-3 seconds pause
                            enemy.sleepCount++;
                        }
                        
                        // Apply wobble to horizontal position
                        const wobbleX = Math.sin(enemy.wobble) * enemy.wobbleAmount;
                        enemy.x += wobbleX * 0.1; // Subtle horizontal drift
                    } else {
                        // Enemy is paused
                        if (Date.now() - enemy.pauseStartTime > enemy.pauseDuration) {
                            enemy.isPaused = false; // Resume movement
                        }
                    }
                    
                    // Check if enemy reached bottom
                    if (enemy.y > canvas.height) {
                        health -= 10;
                        createParticles(enemy.x + enemy.width/2, canvas.height, '#FF0000', 5);
                        return false;
                    }
                    
                    // Die when 30px outside screen boundaries
                    if (enemy.x < -enemy.width - 30 || enemy.x > canvas.width + 30) {
                        // Enemy dies when 30px outside screen
                        enemy.alive = false;
                        score += enemy.points;
                        enemiesKilled++;
                        createFireworkExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color, enemy.isBoss);
                        return false;
                    }
                    
                    // Bounce back when hitting screen edges (before 30px buffer)
                    if (enemy.x < 0) {
                        enemy.x = 0;
                    } else if (enemy.x > canvas.width - enemy.width) {
                        enemy.x = canvas.width - enemy.width;
                    }
                }
                
                // Draw enemy with wobble effect
                const wobbleX = Math.sin(enemy.wobble) * enemy.wobbleAmount * 0.3;
                const drawX = enemy.x + wobbleX;
                const drawY = enemy.y + (enemy.verticalOffset || 0);
                
                // Draw animated enemy
                const time = Date.now() * 0.001;
                
                // Enemy body with animated breathing effect and alternating shapes
                const breathe = Math.sin(time * 4 + enemy.wobble) * 0.02 + 1;
                const bodyWidth = enemy.width * breathe;
                const bodyHeight = enemy.height * breathe;
                
                ctx.fillStyle = enemy.color || '#FF0000';
                
                if (enemy.shape === 'round') {
                    // Round enemy with perfect circle
                    const centerX = drawX + enemy.width / 2;
                    const centerY = drawY + enemy.height / 2;
                    const radius = Math.min(enemy.width, enemy.height) / 2 * breathe;
                    
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.shape === 'square') {
                    // Square enemy with rounded corners
                    const cornerRadius = 8; // Rounded corner radius
                    
                    ctx.beginPath();
                    ctx.moveTo(drawX + cornerRadius, drawY);
                    ctx.lineTo(drawX + bodyWidth - cornerRadius, drawY);
                    ctx.quadraticCurveTo(drawX + bodyWidth, drawY, drawX + bodyWidth, drawY + cornerRadius);
                    ctx.lineTo(drawX + bodyWidth, drawY + bodyHeight - cornerRadius);
                    ctx.quadraticCurveTo(drawX + bodyWidth, drawY + bodyHeight, drawX + bodyWidth - cornerRadius, drawY + bodyHeight);
                    ctx.lineTo(drawX + cornerRadius, drawY + bodyHeight);
                    ctx.quadraticCurveTo(drawX, drawY + bodyHeight, drawX, drawY + bodyHeight - cornerRadius);
                    ctx.lineTo(drawX, drawY + cornerRadius);
                    ctx.quadraticCurveTo(drawX, drawY, drawX + cornerRadius, drawY);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'rectangle') {
                    // Rectangle enemy (wider than tall)
                    ctx.fillRect(drawX, drawY, bodyWidth * 1.3, bodyHeight * 0.7);
                } else if (enemy.shape === 'diamond') {
                    // Diamond enemy (rotated square)
                    const centerX = drawX + enemy.width / 2;
                    const centerY = drawY + enemy.height / 2;
                    const size = Math.min(enemy.width, enemy.height) / 2 * breathe;
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY - size);
                    ctx.lineTo(centerX + size, centerY);
                    ctx.lineTo(centerX, centerY + size);
                    ctx.lineTo(centerX - size, centerY);
                    ctx.closePath();
                    ctx.fill();
                }
                
                // Enhanced animated wings with rounded corners and stronger flapping
                const wingFlap = Math.sin(time * 20) * 0.5 + 0.5; // Stronger flapping (0 to 1 range)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                
                // Left wing with rounded corners
                ctx.save();
                ctx.translate(drawX, drawY + enemy.height/2);
                ctx.rotate(-wingFlap * 0.8); // Stronger rotation
                
                const wingWidth = enemy.width * 0.4;
                const wingHeight = enemy.height * 0.6;
                const wingRadius = 5;
                
                ctx.beginPath();
                ctx.moveTo(-wingWidth, -wingHeight/2 + wingRadius);
                ctx.lineTo(-wingWidth, wingHeight/2 - wingRadius);
                ctx.quadraticCurveTo(-wingWidth, wingHeight/2, -wingWidth + wingRadius, wingHeight/2);
                ctx.lineTo(0, wingHeight/2);
                ctx.lineTo(0, -wingHeight/2);
                ctx.quadraticCurveTo(0, -wingHeight/2, -wingWidth, -wingHeight/2 + wingRadius);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                
                // Right wing with rounded corners
                ctx.save();
                ctx.translate(drawX + enemy.width, drawY + enemy.height/2);
                ctx.rotate(wingFlap * 0.8); // Stronger rotation
                
                ctx.beginPath();
                ctx.moveTo(0, -wingHeight/2 + wingRadius);
                ctx.lineTo(0, wingHeight/2 - wingRadius);
                ctx.quadraticCurveTo(0, wingHeight/2, wingRadius, wingHeight/2);
                ctx.lineTo(wingWidth, wingHeight/2);
                ctx.lineTo(wingWidth, -wingHeight/2);
                ctx.quadraticCurveTo(wingWidth, -wingHeight/2, 0, -wingHeight/2 + wingRadius);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                
                // Enemy eyes based on type - bigger and circular
                ctx.fillStyle = '#FF0000';
                if (enemy.type === 'mosquito') {
                    // Mosquito has multiple small circular eyes
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.arc(drawX + enemy.width * 0.3 + i * 6, drawY + enemy.height * 0.2, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // Other enemies have two big circular eyes
                    ctx.beginPath();
                    ctx.arc(drawX + enemy.width * 0.25, drawY + enemy.height * 0.25, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(drawX + enemy.width * 0.75, drawY + enemy.height * 0.25, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Add stinger for wasp
                if (enemy.type === 'wasp') {
                    ctx.fillStyle = '#FF0000';
                    ctx.fillRect(drawX + enemy.width/2 - 1, drawY + enemy.height, 2, 5);
                }
                
                // Show sleeping Z's when enemy is paused with size animation
                if (enemy.isPaused) {
                    ctx.fillStyle = '#4169E1';
                    const sleepTime = (Date.now() - enemy.pauseStartTime) / 1000;
                    const zCount = Math.min(3, Math.floor(sleepTime / 0.5) + 1);
                    let zText = '';
                    for (let i = 0; i < zCount; i++) {
                        zText += 'Z';
                    }
                    
                    // Animate font size from small to large
                    const animProgress = (sleepTime % 1) / 1; // 0 to 1 animation cycle
                    const fontSize = 12 + Math.sin(animProgress * Math.PI) * 8; // 12px to 20px
                    ctx.font = `bold ${fontSize}px Arial`;
                    
                    // Add fade effect based on animation
                    ctx.globalAlpha = 0.6 + Math.sin(animProgress * Math.PI) * 0.4;
                    
                    ctx.fillText(zText, drawX + enemy.width + 5, drawY - 5);
                    ctx.globalAlpha = 1; // Reset alpha
                }
                
                if (enemy.health < enemy.maxHealth) {
                    // Health bar
                    const healthPercent = enemy.health / enemy.maxHealth;
                    ctx.fillStyle = 'red';
                    ctx.fillRect(drawX, drawY - 10, enemy.width, 4);
                    ctx.fillStyle = 'green';
                    ctx.fillRect(drawX, drawY - 10, enemy.width * healthPercent, 4);
                }
                
                return true;
            }
            return false;
        });

        // Draw and update power-ups
        powerUps = powerUps.filter(powerUp => {
            powerUp.y += powerUp.speed;
            
            // Draw power-up with pulsing effect
            const pulse = Math.sin(Date.now() * 0.005) * 0.2 + 1;
            ctx.save();
            ctx.translate(powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2);
            ctx.scale(pulse, pulse);
            
            // Enhanced animated star power-up
            const time = Date.now() * 0.001;
            const rotation = time * 2;
            
            // Glowing effect
            ctx.shadowBlur = 15 + Math.sin(time * 5) * 5;
            ctx.shadowColor = '#FFD700';
            
            // Rotating star
            ctx.save();
            ctx.rotate(rotation);
            
            // Star gradient
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, powerUp.width/2);
            gradient.addColorStop(0, '#FFFF00');
            gradient.addColorStop(0.5, '#FFD700');
            gradient.addColorStop(1, '#FFA500');
            ctx.fillStyle = gradient;
            
            // Draw star shape
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
                const x = Math.cos(angle) * powerUp.width/2;
                const y = Math.sin(angle) * powerUp.height/2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                
                const innerAngle = angle + Math.PI / 5;
                const innerX = Math.cos(innerAngle) * powerUp.width/4;
                const innerY = Math.sin(innerAngle) * powerUp.height/4;
                ctx.lineTo(innerX, innerY);
            }
            ctx.closePath();
            ctx.fill();
            
            // Inner bright core
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(0, 0, powerUp.width/8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            ctx.shadowBlur = 0;
            
            ctx.restore();
            
            return powerUp.y < canvas.height;
        });

        // Draw particles
        particles.forEach(particle => {
            ctx.globalAlpha = particle.life;
            ctx.fillStyle = particle.color;
            ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
            ctx.globalAlpha = 1;
        });

        // Draw player with animations
        ctx.save();
        
        // Apply transformations for scaling and jumping
        const playerCenterX = player.x + player.width / 2;
        const playerCenterY = player.y + player.height / 2 + playerJumpY;
        
        ctx.translate(playerCenterX, playerCenterY);
        ctx.scale(playerScale, playerScale);
        ctx.translate(-playerCenterX, -playerCenterY);
        
        // Draw animated player
        const time = Date.now() * 0.001;
        
        // Apply recoil offset
        const drawY = player.y + playerJumpY + playerRecoilY;
        
        // Draw animated player sprite
        // console.log('Drawing player - imgLoaded:', playerImgLoaded, 'sprites:', playerSprites.length);
        if (playerImgLoaded && playerSprites.length > 0) {
            // Update animation frame
            const currentTime = Date.now();
            if (currentTime - playerAnimationTime > playerAnimationSpeed) {
                playerAnimationFrame = (playerAnimationFrame + 1) % playerSprites.length;
                playerAnimationTime = currentTime;
            }
            
            // Draw with animation effects
            const animationScale = 1 + Math.sin(time * 8) * 0.08; // Enhanced breathing
            const animationRotation = Math.sin(time * 4) * 0.03; // Enhanced rotation
            const bobOffset = Math.sin(time * 6) * 3; // Bobbing motion
            
            ctx.save();
            ctx.translate(player.x + player.width/2, drawY + player.height/2 + bobOffset);
            ctx.rotate(animationRotation);
            ctx.scale(animationScale, animationScale);
            
            // Draw the current sprite frame
            const currentSprite = playerSprites[playerAnimationFrame];
            ctx.drawImage(currentSprite, -player.width/2, -player.height/2, player.width, player.height);
            
            ctx.restore();
        } else {
            // Enhanced fallback animation
            const pulse = Math.sin(time * 6) * 0.15 + 1;
            const rotation = Math.sin(time * 3) * 0.1;
            
            ctx.save();
            ctx.translate(player.x + player.width/2, drawY + player.height/2);
            ctx.rotate(rotation);
            ctx.scale(pulse, pulse);
            
            // Draw animated rectangle with gradient
            const gradient = ctx.createLinearGradient(-player.width/2, -player.height/2, player.width/2, player.height/2);
            gradient.addColorStop(0, '#32CD32');
            gradient.addColorStop(1, '#228B22');
            ctx.fillStyle = gradient;
            ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
            
            // Add simple animation details
            ctx.fillStyle = '#FFF';
            ctx.fillRect(-5, -5, 10, 10); // Simple "eye"
            
            ctx.restore();
        }
        
                
        // Draw shield if active
        if (currentPowerUp === 'shield') {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(playerCenterX, playerCenterY, player.width * playerScale, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        ctx.restore();

        // Check collisions
        checkCollisions();

        // Spawn enemies
        if (Math.random() < enemySpawnRate) {
            createEnemy();
        }

        // Check wave completion
        if (enemiesKilled >= waveEnemyCount) {
            nextWave();
        }

        // Check game over
        if (health <= 0) {
            gameOver();
            return;
        }

        requestAnimationFrame(update);
        } catch (error) {
            console.error('Game update error:', error);
            // Continue running the game even if there's an error
            requestAnimationFrame(update);
        }
    }

    // Initialize game
    function init() {
        document.getElementById('highScore').textContent = highScore;
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('click', handleMouseClick);
        canvas.addEventListener('contextmenu', handleRightClick);
        canvas.addEventListener('mousedown', handleMouseDown);
        
        // Also support keyboard for testing
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && gameRunning) {
                fireBullet();
            } else if (e.key === '1' && gameRunning) {
                // Toggle auto-fire mode
                autoFire = !autoFire;
                console.log('Auto-fire:', autoFire ? 'ON' : 'OFF');
                
                // Show indicator for auto-fire status
                const indicator = document.getElementById('powerUpIndicator');
                if (autoFire) {
                    indicator.textContent = 'Auto-Fire ON!';
                    indicator.style.display = 'block';
                    indicator.style.color = '#00FF00';
                } else {
                    indicator.style.display = 'none';
                }
            } else if (e.key === '2' && gameRunning) {
                // Toggle auto-movement mode
                autoMove = !autoMove;
                console.log('Auto-movement:', autoMove ? 'ON' : 'OFF');
                
                // Show indicator for auto-movement status
                const indicator = document.getElementById('powerUpIndicator');
                if (autoMove) {
                    indicator.textContent = 'Auto-Move ON!';
                    indicator.style.display = 'block';
                    indicator.style.color = '#00FFFF';
                } else if (!autoFire) {
                    indicator.style.display = 'none';
                }
            }
        });
    }

    // Start game
    function startGame() {
        // Initialize audio context
        initAudio();
        
        // Initialize background images if provided
        loadBackgroundImages();
        
        document.getElementById('startScreen').style.display = 'none';
        gameRunning = true;
        score = 0;
        health = 1000;
        wave = 1;
        enemiesKilled = 0;
        enemies = [];
        bullets = [];
        powerUps = [];
        particles = [];
        currentPowerUp = null;
        enemySpawnRate = 0.02;
        waveEnemyCount = 10;
        backgroundTransitionTime = Date.now();
        
        // Initialize background system
        if (useBackgroundImages) {
            currentBackgroundIndex = Math.floor(Math.random() * backgroundImages.length);
        } else {
            currentColorIndex = Math.floor(Math.random() * backgroundColors.length); // Random starting color
        }
        
        // Reset player animations
        playerScale = 1.0;
        playerTargetScale = 1.0;
        playerJumpY = 0;
        playerTargetJumpY = 0;
        playerJumpVelocity = 0;
        isJumping = false;
        playerRecoilY = 0;
        playerTargetRecoilY = 0;
        
        updateUI();
        
        // Start the game loop
        update();
    }

    // Game over
    function gameOver() {
        gameRunning = false;
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalWave').textContent = wave;
        document.getElementById('gameOver').style.display = 'block';
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flyShooterHighScore', highScore);
        }
    }

    // Restart game
    function restartGame() {
        document.getElementById('gameOver').style.display = 'none';
        startGame();
    }

    // Next wave
    function nextWave() {
        wave++;
        enemiesKilled = 0;
        waveEnemyCount = 10 + wave * 2;
        enemySpawnRate = Math.min(0.02 + wave * 0.005, 0.08);
        
        // Bonus health for completing wave
        health = Math.min(1000, health + 100);
        
        // Show wave notification
        createParticles(canvas.width/2, canvas.height/2, '#00FF00', 20);
    }

    // Update power-ups
    function updatePowerUps() {
        // Check power-up expiration
        if (currentPowerUp && Date.now() > powerUpEndTime) {
            currentPowerUp = null;
            fireRate = 200;
            document.getElementById('powerUpIndicator').style.display = 'none';
        }
    }

    // Update particles
    function updateParticles() {
        particles = particles.filter(particle => {
            particle.x += particle.vx;
            particle.y += particle.vy;
            
            // Apply gravity if particle has gravity property
            if (particle.gravity) {
                particle.vy += particle.gravity;
            } else {
                particle.vy += 0.2; // default gravity
            }
            
            // Slower life decay for firework particles
            particle.life -= particle.isFirework ? 0.01 : 0.02;
            particle.size *= 0.98;
            return particle.life > 0;
        });
    }

    // Update UI
    function updateUI() {
        document.getElementById('score').textContent = `Score: ${score}`;
        document.getElementById('wave').textContent = wave;
        document.getElementById('health').textContent = health;
        document.getElementById('highScore').textContent = highScore;
    }

    // Check collisions
    function checkCollisions() {
        // Bullet-enemy collisions
        bullets.forEach((bullet, bulletIndex) => {
            enemies.forEach((enemy, enemyIndex) => {
                if (enemy.alive && isColliding(bullet, enemy)) {
                    enemy.health -= bullet.damage || 1;
                    
                    // Add knockback effect with random direction
                    const directions = ['left', 'up', 'right'];
                    const randomDirection = directions[Math.floor(Math.random() * directions.length)];
                    
                    switch(randomDirection) {
                        case 'left':
                            enemy.knockbackX = -30;
                            enemy.knockbackY = -10;
                            break;
                        case 'up':
                            enemy.knockbackX = -5;
                            enemy.knockbackY = -25;
                            break;
                        case 'right':
                            enemy.knockbackX = 30;
                            enemy.knockbackY = -10;
                            break;
                    }
                    
                    enemy.isKnockedBack = true;
                    enemy.knockbackDecay = 0.85; // Knockback decay factor
                    
                    if (enemy.health <= 0) {
                        enemy.alive = false;
                        score += enemy.points;
                        enemiesKilled++;
                        
                        // Play death sound
                        playDeathSound();
                        
                        // Add health reward based on enemy's max health
                        const healthReward = enemy.maxHealth * 10; // 10 health points per enemy health point
                        health = Math.min(1000, health + healthReward); // Cap at 1000 max health
                        
                        // Create firework explosion effect
                        createFireworkExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color, enemy.isBoss);
                        
                        createPowerUp(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                    } else {
                        // Splash effect when hit - creates water-like splash pattern
                        const splashColors = ['#FFFF00', '#FFA500', '#FF6347', '#FFD700'];
                        
                        // Create splash ring effect
                        for (let ring = 0; ring < 3; ring++) {
                            setTimeout(() => {
                                for (let i = 0; i < 12; i++) {
                                    const angle = (Math.PI * 2 * i) / 12;
                                    const velocity = 2 + ring * 1.5 + Math.random() * 2;
                                    const color = splashColors[Math.floor(Math.random() * splashColors.length)];
                                    
                                    particles.push({
                                        x: bullet.x,
                                        y: bullet.y,
                                        vx: Math.cos(angle) * velocity,
                                        vy: Math.sin(angle) * velocity - 1, // Slight upward bias
                                        size: Math.random() * 4 + 2 - ring * 0.5,
                                        color: color,
                                        life: 1.2 - ring * 0.2,
                                        gravity: 0.08,
                                        isSplash: true
                                    });
                                }
                            }, ring * 50);
                        }
                        
                        // Add center impact particles
                        for (let i = 0; i < 5; i++) {
                            particles.push({
                                x: bullet.x,
                                y: bullet.y,
                                vx: (Math.random() - 0.5) * 4,
                                vy: (Math.random() - 0.5) * 4 - 2,
                                size: Math.random() * 3 + 2,
                                color: '#FFFFFF',
                                life: 0.8,
                                gravity: 0.1,
                                isSplash: true
                            });
                        }
                    }
                    
                    bullets.splice(bulletIndex, 1);
                }
            });
        });
        
        // Player-powerup collisions
        powerUps.forEach((powerUp, index) => {
            if (isColliding(player, powerUp)) {
                playPowerUpSound(); // Play collection sound
                activatePowerUp(powerUp.type);
                powerUps.splice(index, 1);
                createParticles(powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2, '#FFD700', 10);
            }
        });
        
        // Enemy-player collisions (if no shield)
        if (currentPowerUp !== 'shield') {
            enemies.forEach(enemy => {
                // Create temporary player position for collision detection
                const playerForCollision = {
                    x: player.x,
                    y: player.y + playerJumpY,
                    width: player.width,
                    height: player.height
                };
                
                if (enemy.alive && isColliding(playerForCollision, enemy)) {
                    health -= 20;
                    enemy.alive = false;
                    createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#FF0000', 10);
                }
            });
        }
    }

    // Activate power-up
    function activatePowerUp(type) {
        currentPowerUp = type;
        powerUpEndTime = Date.now() + 15000; // 15 seconds
        
        switch(type) {
            case 'rapidFire':
                fireRate = 50;
                document.getElementById('powerUpIndicator').textContent = 'Rapid Fire Active!';
                break;
            case 'multiShot':
                document.getElementById('powerUpIndicator').textContent = 'Multi-Shot Active!';
                break;
            case 'bigBullet':
                document.getElementById('powerUpIndicator').textContent = 'Big Bullets Active!';
                break;
            case 'shield':
                document.getElementById('powerUpIndicator').textContent = 'Shield Active!';
                break;
        }
        
        document.getElementById('powerUpIndicator').style.display = 'block';
    }

    init();

</script>
